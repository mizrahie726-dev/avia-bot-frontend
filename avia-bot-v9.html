<!DOCTYPE html>\n<html lang="he" dir="rtl">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>אביה הדברות</title>\n<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">\n<style>\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\n:root{--g2:#1a4a2e;--g3:#2d7a4f;--g4:#4caf76;--text:#1a1a1a}\nbody{font-family:'Heebo',sans-serif;background:#f0f4f1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}\n.wrap{width:100%;max-width:480px;height:100vh;max-height:780px;background:white;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.13);display:flex;flex-direction:column;overflow:hidden}\n.top-bar{background:var(--g2);padding:13px 16px;display:flex;align-items:center;gap:11px;flex-shrink:0}\n.av{width:38px;height:38px;border-radius:50%;background:var(--g4);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}\n.agent-name{font-weight:700;color:white;font-size:14px;font-family:'Heebo',sans-serif}\n.status{font-size:11px;color:#a8e6c0;display:flex;align-items:center;gap:4px;font-family:'Heebo',sans-serif}\n.status::before{content:'';width:6px;height:6px;background:#5de89a;border-radius:50%;flex-shrink:0}\n.messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:9px;background:#f8faf8}\n.msg{display:flex;gap:7px;align-items:flex-end;animation:up .2s ease}\n@keyframes up{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}\n.msg.user{flex-direction:row-reverse}\n.msg-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:var(--g3);display:flex;align-items:center;justify-content:center;font-size:11px;color:white;font-weight:700}\n.msg.user .msg-av{background:#dde8e0;color:var(--g2)}\n.bubble{max-width:84%;padding:9px 14px;border-radius:16px;font-size:14px;line-height:1.65;color:var(--text);font-family:'Heebo',sans-serif}\n.msg.bot .bubble{background:white;border:1px solid #deeadf;border-bottom-right-radius:4px}\n.msg.user .bubble{background:var(--g2);color:white;border-bottom-left-radius:4px}\n.typing-wrap{display:flex;gap:7px;align-items:flex-end}\n.typing-dots{background:white;border:1px solid #deeadf;border-radius:16px;border-bottom-right-radius:4px;padding:11px 14px;display:flex;gap:4px}\n.dot{width:6px;height:6px;background:#aaa;border-radius:50%;animation:bo 1.2s infinite}\n.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}\n@keyframes bo{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}\n.qr-area{display:flex;flex-wrap:wrap;gap:6px;padding:9px 12px;background:#f8faf8;border-top:1px solid #eaf0eb;flex-shrink:0;min-height:10px}\n.qr{background:white;border:1.5px solid var(--g3);color:var(--g2);padding:9px 15px;border-radius:50px;font-size:13px;font-family:'Heebo',sans-serif;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;min-height:40px;display:inline-flex;align-items:center}\n.qr:hover{background:var(--g3);color:white}\n.input-row{display:flex;gap:8px;padding:10px 12px;background:white;border-top:1px solid #e5ede8;flex-shrink:0}\n.inp{flex:1;border:1.5px solid #ddeae0;border-radius:50px;padding:10px 16px;font-size:16px;font-family:'Heebo',sans-serif;outline:none;background:#f8faf8;color:var(--text);transition:border-color .2s}\n.inp:focus{border-color:var(--g3)}\n.inp::placeholder{color:#bbb}\n.sbtn{width:38px;height:38px;border-radius:50%;background:var(--g3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}\n.sbtn:hover{background:var(--g4)}\n.sbtn svg{width:16px;height:16px;fill:white}\n@media(max-width:480px){\n  .messages{padding:10px}\n  .bubble{font-size:14px;padding:8px 12px}\n  .qr-area{padding:6px 10px;gap:5px}\n  .input-row{padding:8px 10px;gap:6px}\n  .top-bar{padding:10px 14px}\n  .wrap{border-radius:0;max-height:100vh}\n}\n</style>\n</head>\n<body>\n<div class="wrap">\n  <div class="top-bar">\n    <div class="av">🪲</div>\n    <div>\n      <div class="agent-name">אביה הדברות</div>\n      <div class="status">זמין עכשיו · מענה מיידי</div>\n    </div>\n  </div>\n  <div class="messages" id="msgs"></div>\n  <div class="qr-area" id="qr"></div>\n  <div class="input-row">\n    <input class="inp" id="inp" type="text" placeholder="כתוב כאן..." autocomplete="off" dir="auto">\n    <button class="sbtn" onclick="send()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>\n  </div>\n</div>\n\n<script>\n// ═══════════════════════════════════════════════\n// תוצרי ידע\n// ═══════════════════════════════════════════════\nconst PESTS = {\n  "ג'וקים": {\n    msgs: {\n      "דירה":       "ג'וקים בדירה זה אחד הדברים הכי מרגיזים, אבל יש לזה פתרון טוב. אנחנו משלבים ריסוס ממוקד עם ג'ל פיתיון — הג'ל שם בדיוק איפה שהם מסתתרים, ובטיפול ג'ל בלבד אפשר להישאר בבית לגמרי. המחיר לדירה הוא 300–450 ₪, עם אחריות של 3–6 חודשים.",\n      "בית פרטי":   "ג'וקים בבית פרטי דורשים טיפול קצת יותר רחב, אבל זה לגמרי בר פתרון. אנחנו משלבים ריסוס עם ג'ל פיתיון בנקודות הקינון, ובטיפול ג'ל בלבד אפשר להישאר בבית. המחיר לבית פרטי הוא 450–600 ₪, עם אחריות של 3–6 חודשים.",\n      "בניין משותף": "ג'וקים בבניין דורשים טיפול מרוכז בכל הנקודות הקריטיות — חדרי מדרגות, ארונות חשמל, בורות ביוב. אנחנו יודעים בדיוק איפה לחפש. המחיר לבניין הוא 400–600 ₪, עם אחריות של 3–6 חודשים."\n    },\n    prices: { "דירה": "300–450 ₪", "בית פרטי": "450–600 ₪", "בניין משותף": "400–600 ₪" },\n    propertyQ: "באיזה סוג נכס מדובר?",\n    propertyOpts: ["🏠 דירה", "🏡 בית פרטי", "🏢 בניין משותף"]\n  },\n  "עכברים / חולדות": {\n    msgs: {\n      "דירה":     "מכרסמים בדירה זה לא נעים בכלל, אבל אל דאגה — יש לזה פתרון מסודר. אנחנו מציבים תחנות האכלה ובמקביל סוגרים את כל הכניסות האפשריות, כדי שלא יגיעו אורחים חדשים. הכי חשוב — לא מרססים, אז אין צורך לצאת מהבית בכלל. המחיר לדירה הוא 600–800 ₪, עם אחריות של 1–3 חודשים.",\n      "בית פרטי": "מכרסמים בבית פרטי זה באמת לא נעים, אבל יש לזה פתרון מצוין. אנחנו מציבים תחנות האכלה וסוגרים את כל נקודות הכניסה — כדי לטפל בבעיה הנוכחית ולמנוע את הבאה. לא מרססים, אז אפשר להישאר בבית. המחיר לבית פרטי הוא 800–1,200 ₪, עם אחריות של 1–3 חודשים."\n    },\n    prices: { "דירה": "600–800 ₪", "בית פרטי": "800–1,200 ₪" },\n    propertyQ: "דירה או בית פרטי?",\n    propertyOpts: ["🏠 דירה", "🏡 בית פרטי"]\n  },\n  "פשפש מיטה": {\n    msgs: {\n      "טיפול רגיל — חדר אחד": "פשפשי מיטה זה אחד הדברים הכי מלחיצים — אבל הם לגמרי בני חיסול. אנחנו עושים קיטור + ריסוס אינטנסיבי, ולרוב צריך 2–3 סבבים כדי לסגור את זה לגמרי. תצטרך לצאת מהבית כמה שעות בזמן הטיפול. המחיר לחדר אחד הוא 1,500–2,500 ₪, עם אחריות עד סוף סדרת הטיפולים.",\n      "אנוקסיה — שלילת חמצן": "אנוקסיה היא השיטה היעילה ביותר לפשפשי מיטה — שלילת חמצן בחלל סגור שמחסלת הכול ללא חומרים כימיים. הטיפול מתאים לחללים של 10–15 קוב. המחיר הוא 2,000–3,000 ₪, עם אחריות עד סוף סדרת הטיפולים."\n    },\n    prices: { "טיפול רגיל — חדר אחד": "1,500–2,500 ₪", "אנוקסיה — שלילת חמצן": "2,000–3,000 ₪" },\n    propertyQ: "איזה טיפול מתאים יותר?",\n    propertyOpts: ["🛏️ טיפול רגיל — חדר אחד", "⚗️ אנוקסיה — שלילת חמצן"]\n  },\n  "נמלים": {\n    msgs: {\n      "דירה / דופלקס": "נמלים בדירה זה מטרד אמיתי, אבל הפתרון יחסית מהיר. אנחנו עושים ריסוס היקפי ומשלבים ג'ל פיתיון בנקודות שהן אוהבות לנוע בהן. תצטרך לצאת מהבית כשעתיים עד שהחומר מתייבש. המחיר הוא 400–500 ₪, עם אחריות של 3–6 חודשים.",\n      "בית פרטי":       "נמלים בבית פרטי דורשות טיפול שמכסה גם את הפנים וגם את הסביבה החיצונית. אנחנו עושים ריסוס היקפי + ג'ל פיתיון — שהנמלות לוקחות בחזרה לקן ומחסלות אותו מבפנים. תצטרך לצאת כשעתיים. המחיר הוא 400–500 ₪, עם אחריות של 3–6 חודשים."\n    },\n    prices: { "דירה / דופלקס": "400–500 ₪", "בית פרטי": "400–500 ₪" },\n    propertyQ: "דירה או בית פרטי?",\n    propertyOpts: ["🏠 דירה / דופלקס", "🏡 בית פרטי"]\n  },\n  "נמלת אש": {\n    msgs: {\n      "עד חצי דונם":    "נמלת אש זה כבר כואב ממש — עקיצה שלהן לא נעימה בכלל. אנחנו מפזרים פיתיון דברה מונעת לאחרונה?\n\n=== ידע מקצועי לפי מזיק ===\n\nתיקן אמריקאי:\nסימנים: ג'וק גדול 3-4 ס"מ, חום כהה. נראה במקלחות, שירותים, מחסנים, קרבת ביוב.\nסיבות: בורות ביוב, צנרת, לחות, שאריות מזון.\nסיכונים: חיידקים, זיהום מזון, גועל.\nמה לבד: ניקיון, אחסון מזון בקופסאות, איטום סדקים, מכסי ביוב תקינים.\nטיפול מקצועי: ריסוס היקפי בנקודות מעבר ומסתור, לעיתים גם בורות ביוב וחדרי מדרגות. חומרים שנשארים פעילים כמה חודשים.\nמחיר: דירה 300-450 שקל, בית 450-600, בניין 400-600. אחריות 3-6 חודשים.\nזמן: ריסוס - 2-3 שעות בחוץ. גל בלבד - אפשר להישאר.\n\nתיקן גרמני:\nסימנים: ג'וק קטן חום עם שני פסים כהים על הגב. בארונות מטבח, מאחורי מקרר ותנור.\nסיבות: מטבחים חמים ולחים, שומנים, שאריות מזון, מכשירי חשמל.\nסיכונים: זיהום מזון, התרבות מהירה מאוד, קשה להיפטר לבד.\nמה לבד: ניקוי שומנים, לא להשאיר כלים מלוכלכים בלילה, מטבח יבש, איטום חריצים.\nטיפול מקצועי: גל פיתיון מקצועי בנקודות מדויקות, לעיתים ריסוס עדין. כמעט תמיד נדרש יותר מטיפול אחד.\nמחיר: דירה 450-600 שקל, מטבח בית 500-800. אחריות 3-6 חודשים.\nזמן: גל בלבד - אפשר להישאר. עם ריסוס - 2-3 שעות.\n\nנמלים:\nסימנים: שיירות נמלים על רצפה, קירות, סביב מזון מתוק.\nסיבות: פירורים, מזון פתוח, סדקים בקירות, קנים בחצר.\nמה לבד: ניקוי פירורים יומי, מזון בקופסאות אטומות, איטום סדקים.\nטיפול מקצועי: ריסוס היקפי + גל פיתיון במסלולים - פוגע גם בקן עצמו.\nמחיר: 400-500 שקל. אחריות 3-6 חודשים. לצאת כשעתיים.\n\nנמלת אש:\nסימנים: עקיצות שורפות מאוד, נמלים קטנות כתום-אדום, בדשא ובקרקע לחה.\nסיכונים: כאב חזק, תגובה אלרגית, סיכון לתינוקות וילדים.\nמה לבד: צמצום השקיה, גינה מסודרת, לא להפריע לקנים.\nטיפול מקצועי: פיתיונות ייעודיים בשטח. לא להשקות 24 שעות לפני ו-48 שעות אחרי. לעיתים טיפול חוזר אחרי כמה שבועות.\nמחיר: 600-800 שקל לחצי דונם. אחריות כ-3 חודשים.\n\nצרעות:\nסימנים: תנועה מוגברת לנקודה, קן גלוי (כדור נייר/בוץ), עקיצות באזור חצר.\nסיכונים: עקיצה כואבת, תגובה אלרגית חמורה, סכנת חיים לאלרגיים.\nחשוב: לא להתקרב לקן לבד - סכנה ממשית.\nטיפול מקצועי: ריסוס ממוקד על הקן (לרוב בערב), הסרה בטוחה. לעיתים יותר מביקור אחד.\nמחיר: 300-600 שקל. אחריות על חיסול הקן הנוכחי.\n\nפרעושים וקרציות:\nסימנים: עקיצות ברגליים, נקודות שחורות על מצעים, חיה מתגרדת.\nסיבות: בעלי חיים לא מטופלים, חיות משוטטות בחצר.\nמה לבד: וטרינר לחיות, שאיבה יסודית, כביסה בחום גבוה.\nטיפול מקצועי: ריסוס רצפות/שטיחים/ספות. חייב טיפול מקביל בבעלי חיים. לצאת 4-5 שעות.\nמחיר: דירה 450-650 שקל, בית+חצר 750-1150. אחריות 3-6 חודשים.\n\nקרציוני יונים:\nסימנים: עקיצות בעיקר בלילה, תחושת זחילה, הופעה אחרי יונים בסביבה.\nסיבות: קיני יונים סמוכים, לשלשת יונים, פינוי קן ללא טיפול בטפילים.\nטיפול מקצועי: ריסוס באזורי חדירה ובמקור הקן, שילוב הרחקת יונים. ללא הרחקת יונים הבעיה תחזור.\nמחיר: 400-600 שקל. אחריות כ-6 חודשים בתנאי שהיונים הורחקו.\n\nפשפש מיטה:\nסימנים: עקיצות בקווים/מקבצים, כתמי דם על מצעים, נקודות שחורות בתפרי המזרן.\nסיבות: מלונות, רהיטים יד שנייה, מזוודות.\nחשוב: לא לזרוק מזרן בלי תיאום - מפיץ את הבעיה.\nטיפול מקצועי: שאיבה + קיטור חם + ריסוס ייעודי. כמעט תמיד נדרשת סדרת 2-3 טיפולים. לצאת כמה שעות.\nמחיר: חדר אחד 1500-2500 שקל, אנוקסיה 2000-3000 שקל. אחריות עד סוף הסדרה.\n\nמכרסמים:\nסימנים: קולות ריצה בתקרה, צואה קטנה, סימני כרסום.\nסיכונים: מחלות, פגיעה בכבלים, זיהום מזון.\nמה לבד: מזון בכלים אטומים, פינוי גרוטאות, איטום חורים.\nטיפול מקצועי: תחנות האכלה + מלכודות + המלצות איטום. לא מרססים - לא צריך לצאת מהבית.\nמחיר: דירה 600-800 שקל, בית 800-1200. אחריות 1-3 חודשים.\n\nיונים:\nסימנים: לשלשת, קינים, רעש תדיר.\nסיכונים: לכלוך, מחלות, נזק למבנה, טפילים (קרציונים).\nטיפול מקצועי: רשתות 800-1200 שקל, דוקרנים 80-150 שקל למטר, קפיצים 90-200 שקל למטר. לא צריך לצאת. אחריות שנה ומעלה.\n\nיתושים:\nסיבות: מים עומדים בצלחות עציצים, דליים, מרזבים סתומים.\nמה לבד: ריקון מים עומדים, רשתות על חלונות.\nטיפול מקצועי: ריסוס נקודתי + טיפול במקורות מים. לצאת שעה-שעתיים. מחיר 600-800 שקל. אחריות עד סוף העונה.\n\n=== טיפולים ושיטות ===\nהדברה כימית: יעילה ומהירה, לנגיעות קשות. דורש יציאה מהבית.\nהדברה ירוקה: חומרים טבעיים, מתאים לבתים עם ילדים, ריח מינימלי.\nהדברה משולבת IPM: שילוב מניעה+ניטור+ריסוס, מתאים לעסקים.\nהרחקה: מחסומים פיזיים ליונים ומכרסמים, פתרון ארוך טווח.\n\n=== לפי סוג נכס ===\nדירה: ג'וקים, נמלים, פרעושים, פשפש, מכרסמים.\nבית+חצר: כל המזיקים + נמלת אש, יתושים, יונים.\nמסעדה/עסק מזון: ג'וקים גרמני, נמלים, מכרסמים, זבובים. חוזה שוטף + תיק הדברה.\nמלון: פשפש מיטה (ניטור קבוע!), יונים, מכרסמים.\nמחסן/מפעל: מכרסמים, ג'וקים, נמלים. אחזקה חודשית/רבעונית.\n\n=== אם לא יודע ===\nשאלה חשובה! כדי לתת תשובה מקצועית ומדויקת ב-100% כדאי לדבר ישירות עם שלומי: 077-997-9673. הוא זמין עכשיו.\n\nפרטי חברה: 077-997-9673 | 052-780-7612 | א-ה 8:00-16:00 | שישי בתיאום | שבת סגור.`\n\n\n// ═══════════════════════════════════════════════\n// הנחיות הכנה לפי מזיק\n// ═══════════════════════════════════════════════\nconst PREP = {\n  "ג'וקים": `לקראת הטיפול — כמה דברים קטנים שיעשו את ההבדל:\n\n🔧 לפני:\n• פנה את תוכן הארונות מתחת לכיור ובמטבח\n• הוצא כלים, מזון ותבלינים לשקיות אטומות\n• נקה שאריות מזון ופירורים\n• פנה מתחת למקרר ולתנור\n\n✅ אחרי:\n• אוורר את הדירה 2–3 שעות לפני שתחזרו\n• אל תנקה את אזורי הריסוס לפחות שבועיים\n• ג'ל פיתיון — אין צורך לצאת כלל`,\n\n  "עכברים / חולדות": `לקראת הטיפול — כמה הכנות פשוטות:\n\n🔧 לפני:\n• אחסן את כל המזון בכלים אטומים\n• פנה פינות עמוסות שעלולות להיות מסתור\n• רוקן את פח האשפה\n\n✅ אחרי:\n• לא צריך לצאת מהבית — הטיפול בתחנות בטוחות\n• בדוק את התחנות אחת לשבוע ודווח לשלומי\n• סגור פתחים וסדקים במידת האפשר`,\n\n  "פשפש מיטה": `לקראת הטיפול — חשוב מאוד להתכונן:\n\n🔧 לפני:\n• כבס מצעים, כריות וכיסויים בחום 60°+ לפחות\n• פנה את תוכן הארון הצמוד למיטה\n• שמור בגדים בשקיות ניילון אטומות\n• ❗ אל תזיז את המזרן לחדר אחר — זה מפיץ את הבעיה\n\n✅ אחרי:\n• צא מהבית 3–4 שעות\n• אל תציע את המיטה ואל תנקה לפחות שבוע`,\n\n  "נמלים": `לקראת הטיפול:\n\n🔧 לפני:\n• נקה שאריות מזון ופירורים לחלוטין\n• הוצא כלי מזון פתוחים והכנס לשקיות אטומות\n• אחסן פירות וממתקים בכלים סגורים\n\n✅ אחרי:\n• צא מהבית כשעתיים\n• אל תנקה את אזורי הריסוס שבוע לפחות\n• ג'ל פיתיון — תן לנמלות לקחת אותו לקן`,\n\n  "נמלת אש": `לקראת הטיפול:\n\n🔧 לפני:\n• אל תשקה את הגינה 24 שעות לפני הטיפול\n• הרחק ילדים וחיות מחמד מהשטח\n• סמן אזורי קינון אם ידוע לך היכן הם\n\n✅ אחרי:\n• אל תשקה 48 שעות לפחות\n• הרחק ילדים וחיות 2–3 שעות\n• תן לפיתיון לעשות את העבודה — אל תפריע לנמלות`,\n\n  "יתושים": `לקראת הטיפול:\n\n🔧 לפני:\n• רוקן כל מיכל עם מים עומדים (צלחות עציצים, דליים, מרזבים)\n• גזום צמחייה ועשב גבוה\n• הרחק ילדים וחיות מחמד מהגינה\n\n✅ אחרי:\n• הרחק מהגינה שעה–שעתיים\n• שמור על ניקוז תקין וריקון מים עומדים`,\n\n  "יונים": `לקראת ההתקנה:\n\n🔧 לפני:\n• נקה את שאריות הצואה והקן מהמרפסת/גג לפני הגעת הצוות\n• הרחק חפצים מאזור ההתקנה\n• אם יש ילדים קטנים — הרחק מהמרפסת בזמן ההתקנה\n\n✅ אחרי:\n• הרשת/הדוקרנים עמידים ואין צורך בתחזוקה שוטפת\n• אחריות שנה+ על ההתקנה`,\n\n  "צרעות": `לקראת הטיפול:\n\n🔧 לפני:\n• אל תתקרב לקן לבד — סכנה ממשית\n• סגור חלונות ודלתות של הבית בזמן הטיפול\n• הרחק ילדים וחיות מחמד מהאזור\n\n✅ אחרי:\n• הישאר מהאזור 2–3 שעות\n• לאחר שהקן לא פעיל — ניתן להסיר אותו`,\n\n  "פרעושים / קרציות": `לקראת הטיפול — חשובמאוד:\n\n🔧 לפני:\n• קח את חיית המחמד לווטרינר לטיפול במקביל — חובה!\n• שאב אבק יסודי בכל הבית, במיוחד שטיחים וספות\n• כבס כל המצעים ושמיכות חיית המחמד בחום גבוה\n• פנה את הרצפה מחפצים קטנים\n\n✅ אחרי:\n• צא מהבית 4–5 שעות\n• אל תשאב אבק שבוע לאחר הטיפול`\n};\n// ═══════════════════════════════════════════════\n// מצב השיחה\n// ═══════════════════════════════════════════════\nconst S = {\n  step: 'start',\n  isPrivate: null,\n  pest: null,\n  property: null,\n  pets: null,\n  children: null,\n  recurring: null,\n  chosenTime: null,\n  name: null,\n  phone: null,\n  bizType: null,\n  bizAnswer: null,\n  bizAnswer1: null,\n  bizAnswer2: null,\n  bizAnswer3: null\n};\n\n// ═══════════════════════════════════════════════\n// תאריכים\n// ═══════════════════════════════════════════════\nfunction nextDates(n=2){\n  const names = ['ראשון','שני','שלישי','רביעי','חמישי'];\n  const res = [];\n  const d = new Date();\n  d.setDate(d.getDate()+1);\n  while(res.length < n){\n    const dow = d.getDay();\n    if(dow >= 0 && dow <= 4){\n      const dd = String(d.getDate()).padStart(2,'0');\n      const mm = String(d.getMonth()+1).padStart(2,'0');\n      res.push({ label: `יום ${names[dow]} ${dd}/${mm}`, full: `יום ${names[dow]} ${dd}/${mm}` });\n    }\n    d.setDate(d.getDate()+1);\n  }\n  return res;\n}\nconst DATES = nextDates(2);\n\n// ═══════════════════════════════════════════════\n// UI\n// ═══════════════════════════════════════════════\nfunction clean(t){\n  return t\n    .replace(/#{1,6}\s*/g,'')\n    .replace(/\*\*(.*?)\*\*/g,'$1')\n    .replace(/\*(.*?)\*/g,'$1')\n    .replace(/__(.*?)__/g,'$1')\n    .replace(/`{1,3}[^`]*`{1,3}/g,'')\n    .replace(/^\s*[-*|>]\s*/gm,'')\n    .replace(/\|.*\|/g,'')\n    .replace(/\n{3,}/g,'\n\n')\n    .trim();\n}\n\nfunction addBot(txt, delay=0){\n  setTimeout(()=>{\n    const m = document.getElementById('msgs');\n    const d = document.createElement('div');\n    d.className = 'msg bot';\n    d.innerHTML = `<div class="msg-av">א</div><div class="bubble">${clean(txt).replace(/\n/g,'<br>')}</div>`;\n    m.appendChild(d);\n    m.scrollTop = m.scrollHeight;\n  }, delay);\n}\n\nfunction addUser(txt){\n  const m = document.getElementById('msgs');\n  const d = document.createElement('div');\n  d.className = 'msg user';\n  d.innerHTML = `<div class="msg-av">👤</div><div class="bubble">${txt}</div>`;\n  m.appendChild(d);\n  m.scrollTop = m.scrollHeight;\n}\n\nfunction setQR(opts){\n  const el = document.getElementById('qr');\n  el.innerHTML = '';\n  opts.forEach(o => {\n    // כפתורי טלפון — פתח חיוג ישיר\n    if(o.includes('077-997-9673') || o.includes('התקשר')){\n      const a = document.createElement('a');\n      a.href = 'tel:0779979673';\n      a.className = 'qr';\n      a.textContent = o;\n      a.style.textDecoration = 'none';\n      el.appendChild(a);\n      return;\n    }\n    const b = document.createElement('button');\n    b.className = 'qr';\n    b.textContent = o;\n    b.onclick = () => { el.innerHTML = ''; handleInput(o, true); };\n    el.appendChild(b);\n  });\n}\n\nfunction clearQR(){ document.getElementById('qr').innerHTML = ''; }\n\nfunction showTyping(){\n  const m = document.getElementById('msgs');\n  const d = document.createElement('div');\n  d.className = 'typing-wrap'; d.id = 'typing';\n  d.innerHTML = `<div class="msg-av" style="width:26px;height:26px;border-radius:50%;background:var(--g3);display:flex;align-items:center;justify-content:center;font-size:11px;color:white;font-weight:700;flex-shrink:0">א</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;\n  m.appendChild(d);\n  m.scrollTop = m.scrollHeight;\n}\nfunction rmTyping(){ const t=document.getElementById('typing'); if(t) t.remove(); }\n\n// ═══════════════════════════════════════════════\n// זיהוי שאלה\n// ═══════════════════════════════════════════════\nfunction isQuestion(txt){\n  const t = txt.trim();\n  // תשובות ידועות — לעולם לא שאלות\n  const knownAnswers = ['לא בטוח','אין חיות','אין ילדים','חדשה','חזרה','פעם ראשונה','כן יש','לא יודע'];\n  if(knownAnswers.some(a => t.includes(a))) return false;\n  if(t.endsWith('?') || t.endsWith('?')) return true;\n  const qwords = ['שאלה','שאלות','מה זה','האם','כמה','למה','מתי','איך','מסוכן','ריח','זמן','אחריות','רישיון','מעמ','כואב','מזיק','לילדים','לתינוק','לכלב','לחתול','לדגים','לתוכי'];\n  const lower = t.toLowerCase();\n  return qwords.some(w => lower.includes(w));\n}\n\n// ═══════════════════════════════════════════════\n// Flow ראשי — scripted לחלוטין\n// ═══════════════════════════════════════════════\nfunction startFlow(){\n  addBot('שלום! 👋 גילית מזיק בבית או בעסק?\n\nתן לי דקה ואני נותן לך פתרון + מחיר מיידי.');\n  setQR(['🏠 פרטי', '🏪 עסק / מסחרי']);\n}\n\nfunction handleInput(txt, isButton=false){\n  addUser(txt);\n  const m = txt.toLowerCase().trim();\n\n  // חזרה לתפריט מכל שלב\n  if((m.includes('חזור') || m.includes('תפריט') || m.includes('התחל מחדש')) && S.step !== 'start'){\n    Object.assign(S, {step:'start',isPrivate:null,pest:null,property:null,pets:null,children:null,recurring:null,chosenTime:null,name:nu 300);\n    return;\n  }\n\n  // ── time: בחירת זמן ──\n  if(S.step === 'time'){\n    const isDate = DATES.some(d => txt.includes(d.label)) ||\n                   txt.includes('בוקר') || txt.includes('אחה"צ') ||\n                   txt.includes('בהקדם') || txt.includes('תיאום');\n    if(!isDate){\n      askFAQ(txt, ()=>{\n        const [d1,d2] = DATES;\n        setTimeout(()=>{\n          addBot('אז מתי יהיה לך נוח שנגיע?');\n          setQR([\n            `☀️ ${d1.label} — בוקר`,\n            `🌤️ ${d1.label} — אחה"צ`,\n            `☀️ ${d2.label} — בוקר`,\n            `🌤️ ${d2.label} — אחה"צ`\n          ]);\n        }, 400);\n      });\n      return;\n    }\n    S.chosenTime = txt.replace(/^[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}️\s]+/u,'').trim();\n    S.step = 'collect_name';\n    setTimeout(()=>{\n      addBot('מעולה! רק כמה פרטים קטנים ונהיה מסודרים.\n\nמה שמך?');\n      clearQR();\n    }, 300);\n    return;\n  }\n\n  // ── collect name ──\n  if(S.step === 'collect_name'){\n    if(isQuestion(txt)){\n      askFAQ(txt, ()=>{\n        setTimeout(()=>{ addBot('ועכשיו, מה שמך?'); clearQR(); }, 400);\n      });\n      return;\n    }\n    const name = txt.trim();\n    if(name.length < 2){\n      setTimeout(()=>{ addBot('אפשר לדעת שמך?'); }, 300);\n      return;\n    }\n    S.name = name;\n    S.step = 'collect_phone';\n    setTimeout(()=>{\n      addBot(`${S.name}, מה מספר הטלפון שלך?`);\n    }, 300);\n    return;\n  }\n\n  // ── collect phone ──\n  if(S.step === 'collect_phone'){\n    if(isQuestion(txt)){\n      askFAQ(txt, ()=>{\n        setTimeout(()=>{ addBot(`${S.name}, מה מספר הטלפון שלך?`); }, 400);\n      });\n      return;\n    }\n    // ניקוי תווים + תמיכה ב+972\n    let rawPhone = txt.replace(/[\s\-()]/g,'');\n    if(rawPhone.indexOf('+972') === 0) rawPhone = '0' + rawPhone.slice(4);\n    else if(rawPhone.indexOf('972') === 0 && rawPhone.length === 12) rawPhone = '0' + rawPhone.slice(3);\n    const digits = rawPhone.replace(/[^0-9]/g,'');\n    const validMobile = /^05[0-9]{8}$/.test(digits);\n    const validLandline = /^0[2348][0-9]{7}$/.test(digits);\n    const valid1700 = /^1[78][0-9]{8}$/.test(digits);\n    if(!validMobile && !validLandline && !valid1700){\n      setTimeout(()=>{\n        addBot('המספר לא נראה תקין. מספר נייד בישראל מתחיל ב-05 ובן 10 ספרות — אפשר לנסות שוב?');\n      }, 300);\n      return;\n    }\n    S.phone = digits;\n    S.step = 'done';\n    const av = 'AV-' + Math.floor(1000 + Math.random()*9000);\n    setTimeout(()=>{\n      const prepNote = PREP[S.pest] ? ("\n\n" + PREP[S.pest]) : "";\n      const petLine = S.pets && !S.pets.includes('אין') ? `\n🐾 ${S.pets}` : '';\n      const childLine = S.children && !S.children.includes('אין') ? `\n👶 ${S.children}` : '';\n      addBot(`מעולה ${S.name}! 🎉 קבענו ל-${S.chosenTime}.\n\n🪲 ${S.pest} — ${S.property || ''}${petLine}${childLine}\n📞 ${S.phone}\nמספר אישור: ${av}\n\nמעדכן את שלומי — הוא בדרך אליך. אם יש שינוי או שאלה שעולה עד אז, פשוט כתוב לי כאן. שיהיה יום שקט! 😊`);\n\n      const petLine2 = S.pets && !S.pets.includes('אין') ? '%0Aחיות: ' + S.pets : '';\n      const childLine2 = S.children && !S.children.includes('אין') ? '%0Aילדים: ' + S.children : '';\n      const recurLine = S.recurring && !S.recurring.includes('לא') ? '%0Aסוג: ' + S.recurring : '';\n\n      const bizLine = S.bizType ? '%0Aעסק: ' + S.bizType + (S.bizAnswer1 ? ' | ' + S.bizAnswer1 : '') + (S.bizAnswer2 ? ' | ' + S.bizAnswer2 : '') + (S.bizAnswer3 ? ' | ' + S.bizAnswer3 : '') : '';\n      const shlomiMsg = 'פגישה חדשה! 🗓️%0Aמספר: ' + av + '%0Aשם: ' + S.name + '%0Aטלפון: ' + S.phone + '%0Aטיפול: ' + S.pest + ' — ' + (S.property||'') + '%0Aמועד: ' + S.chosenTime + petLine2 + childLine2 + recurLine + bizLine;\n      const shlomiWa = 'https://wa.me/972527807612?text=' + shlomiMsg;\n\n      const clientMsg = encodeURIComponent('סיכום פגישה — אביה הדברות\nמספר אישור: ' + av + '\nמועד: ' + S.chosenTime + '\nטיפול: ' + S.pest + '\nשם: ' + S.name + ' | ' + S.phone + '\n\nשלומי יצור קשר לאישור.');\n      const clientWa = 'https://wa.me/?text=' + clientMsg;\n\n      const qrEl = document.getElementById('qr');\n      qrEl.innerHTML = '';\n\n      const btnShlomi = document.createElement('a');\n      btnShlomi.href = shlomiWa;\n      btnShlomi.target = '_blank';\n      btnShlomi.className = 'qr';\n      btnShlomi.style.cssText = 'text-decoration:none;background:#25D366;color:white;border:none;font-weight:600';\n      btnShlomi.textContent = '📲 שלח פגישה לשלומי';\n      qrEl.appendChild(btnShlomi);\n\n      const btnClient = document.createElement('a');\n      btnClient.href = clientWa;\n      btnClient.target = '_blank';\n      btnClient.className = 'qr';\n      btnClient.style.textDecoration = 'none';\n      btnClient.textContent = '💬 שמור סיכום ב-WhatsApp';\n      qrEl.appendChild(btnClient);\n\n      const tel = document.createElement('a');\n      tel.href = 'tel:0779979673';\n      tel.className = 'qr';\n      tel.style.textDecoration = 'none';\n      tel.textContent = '📞 077-997-9673';\n      qrEl.appendChild(tel);\n    }, 300);\n    return;\n  }\n\n  // ── done / חזרה ──\n  if(S.step === 'done' || txt.includes('חזור לתפריט') || txt.includes('חזור')){\n    // reset\n    Object.assign(S, {step:'start',isPrivate:null,pest:null,property:null,pets:null,children:null,recurring:null,chosenTime:null,name:null,phone:null,bizType:null,bizAnswer:null,bizAnswer1:null,bizAnswer2:null,bizAnswer3:null});\n    setTimeout(()=>{\n      addBot('כיצד אוכל לעזור?');\n      setQR(['🏠 פרטי','🏪 עסק / מסחרי']);\n    }, 300);\n    return;\n  }\n\n  // ── fallback: שאלת FAQ דרך AI ──\n  askFAQ(txt);\n}\n\n// ═══════════════════════════════════════════════\n// AI — רק לשאלות FAQ חריגות\n// ═══════════════════════════════════════════════\nasync function askFAQ(txt, callback=null){\n  showTyping();\n  // בנה context מלא של מה שכבר ידוע\n  const ctx = [];\n  if(S.pest) ctx.push('מזיק שזוהה: ' + S.pest);\n  if(S.property) ctx.push('סוג נכס: ' + S.property);\n  if(S.pets && !S.pets.includes('אין') && S.pets !== 'עסק') ctx.push('חיות מחמד: ' + S.pets);\n  if(S.children && !S.children.includes('אין')) ctx.push('ילדים/תינוקות: ' + S.children);\n  if(S.isPrivate === false) ctx.push('לקוח עסקי');\n  const ctxNote = ctx.length > 0\n    ? '\n\n===מידע שכבר ידוע מהשיחה - חובה להשתמש בו===\n' + ctx.join('\n') + '\n===אל תשאל שוב על מידע זה. ענה ישירות לשאלה בהתבסס על ההקשר.==='\n    : '';\n\n  try{\n    const r = await fetch('https://nodejs-production-55c3.up.railway.app/api/chat',{\n      method:'POST',\n      headers:{'Content-Type':'application/json'},\n      body:JSON.stringify({\n        model:'claude-sonnet-4-6',\n        max_tokens:600,\n        system: FAQ_SYS + ctxNote,\n        messages:[{role:'user',content:txt}]\n      })\n    });\n    const data = await r.json();\n    rmTyping();\n    const reply = data.content?.[0]?.text || 'לשאלות נוספות התקשר: 077-997-9673';\n    addBot(clean(reply));\n    // callback — להחזיר לשלב הנכון\n    if(callback) { callback(); return; }\n    // אחרי FAQ — הצג כפתורים לפי שלב נוכחי בשקט, ללא הודעה נוספת\n    setTimeout(()=>{\n      if(S.step === 'pest'){\n        setQR(['🪳 ג\'וקים','🐭 עכברים / חולדות','🛏️ פשפש מיטה','🐜 נמלים','🐜 נמלת אש','🦟 יתושים','🐦 יונים','🐝 צרעות','🐛 פרעושים / קרציות','❓ אחר']);\n      } else if(S.step === 'time'){\n        const [d1,d2] = DATES;\n        setQR([`☀️ ${d1.label} — בוקר`,`🌤️ ${d1.label} — אחה"צ`,`☀️ ${d2.label} — בוקר`,`🌤️ ${d2.label} — אחה"צ`]);\n      } else if(S.step === 'profile_pets'){\n        setQR(['🐕 כלב / חתול','🐠 תוכי / דגים','🚫 אין חיות']);\n      } else if(S.step === 'profile_children'){\n        setQR(['👶 כן, יש תינוק / ילד קטן','🧒 ילדים מעל גיל 5','🚫 אין ילדים']);\n      } else if(S.step === 'profile_recurring'){\n        setQR(['🆕 חדשה — פעם ראשונה','🔄 חזרה אחרי טיפול קודם','❓ לא בטוח']);\n      } else if(S.step === 'property' && S.pest){\n        const p = PESTS[S.pest];\n        if(p) setQR(p.propertyOpts);\n      }\n    }, 500);\n  }catch(e){\n    rmTyping();\n    addBot('לשאלות נוספות התקשר: 077-997-9673 📞');\n    if(callback) callback();\n  }\n}\n\n// ═══════════════════════════════════════════════\n// Input\n// ═══════════════════════════════════════════════\nfunction send(){\n  const i = document.getElementById('inp');\n  const v = i.value.trim();\n  if(!v) return;\n  i.value = '';\n  clearQR();\n  handleInput(v, false);\n}\n\ndocument.getElementById('inp').addEventListener('keydown', e => { if(e.key==='Enter') send(); });\n\nwindow.addEventListener('load', () => { setTimeout(startFlow, 350); });\n</script>\n</body>\n</html>\n
